<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Pacioli GA</title>
</head>

<body onload="onLoad();">
    <div id="console"></div>
    <div id="pacioli_hook" style=" margin: 10px"></div>
</body>


<script>


    // Add a {file, function, kind, params, options?} entry for each example to this list and 
    // include its script further below. The kind is one of 'scene', 'animation', or 
    // 'stateful-animation'. The parameters is a list of [label, number, unit] tuples. The UI
    // will  make an input for each parameter and use the numbers as initial value. The script's
    // scene function fun must accept the same number as arguments.
    //
    // Strings are for now supported by using unit 'string'.
    //
    // Note that the space has unit metre. The scene elements must have compatible units,
    // otherwise runtime errors will occur in the browser.
    const examples = [
        {
            file: "torque_cross_vector",
            function: "scene_torque_orbital2d_pointmass",
            kind: 'stateful-animation',
            params: [["mass", 5, "gram"], ["rx", 2, "metre"]]
        },
        {
            file: "torque_cross_vector3d",
            function: "scene_orbit_point_mass",
            kind: 'stateful-animation',
            params: [
                ["mass", 1, "gram"],
                ["x", -4, "metre"],
                ["y", 4, "metre"],
                ["z", 0, "metre"],
                ["force field (1, 2, 3 or 4)", 1, "1"],
                ["torque factor", 1, "metre / gram / metre * second^2 / metre"],
                ["force factor", 1, "metre / gram / metre * second^2"],
                ["momentum factor", 1, "metre / gram / metre^2 * second"],
                ["velocity factor", 1, "metre / metre * second"]
            ]
        },
        {
            file: "cross_vector",
            function: "scene_cross_oscillate",
            kind: 'animation',
            params: [["x", 2, "metre"], ["y", 3, "metre"]]
        },
        {
            file: "cross_vector",
            function: "scene_cross_dimless_oscillate",
            unit: "1",  // Override the default metre!
            kind: 'animation',
            params: [["x", 2, "1"], ["y", 3, "1"]]
        },
        {
            file: "bi_vector",
            function: "scene1",
            kind: 'scene',
            params: [["x", 2, "metre"], ["y", 1, "metre"], ["z", 0, "metre"], ["x", -3, "metre"], ["y", 0, "metre"], ["z", 2, "metre"], ["wireframe", 0]]
        },
        {
            file: "bi_vector",
            function: "scene2",
            kind: 'scene',
            params: [["wireframe", 0]]
        },
        {
            file: "inner",
            function: "the_scene",
            kind: 'scene',
            params: [["x", 5, "metre"], ["y", 0, "metre"], ["z", 5, "metre"], ["x", 0, "metre"], ["y", 7, "metre"], ["z", 7, "metre"]]
        },
        {
            file: "outer_cos_sin",
            function: "the_scene",
            kind: 'scene',
            params: [["i", 3]]
        },
        {
            file: "weird",
            function: "the_scene",
            kind: 'animation',
            params: [["n", 50], ["k", 5], ["freq", 1, "hertz"]],
            options: { axis: false }
        },
        {
            file: "cubes",
            function: "scene1",
            kind: 'stateful-animation',
            params: [["cubes", 25], ["terms", 3], ["speedup", 1]]
        },
        {
            file: "cubes",
            function: "scene2",
            kind: 'scene',
            params: []
        },
        {
            file: "cubes",
            function: "scene3",
            kind: 'scene',
            params: [["a", 5, "metre"], ["b", 5, "metre"], ["c", 5, "metre"]]
        }
    ]

    function onLoad() {
        main(examples)
    }
</script>

<script type="text/javascript" src="pacioli-0.5.0.bundle.js"></script>

<!-- Include each compiled example script here and add the examples to the list above -->
<script type="text/javascript" src="geom3/bi_vector.js"></script>
<script type="text/javascript" src="geom3/inner.js"></script>
<script type="text/javascript" src="geom3/outer_cos_sin.js"></script>
<script type="text/javascript" src="geom3/weird.js"></script>
<script type="text/javascript" src="geom3/cubes.js"></script>
<script type="text/javascript" src="geom3/cross_vector.js"></script>
<script type="text/javascript" src="geom3/torque_cross_vector.js"></script>
<script type="text/javascript" src="geom3/torque_cross_vector3d.js"></script>
<script type="text/javascript" src="scene.js"></script>

</html>
