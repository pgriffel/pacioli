<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <title>Wave</title>

    <script type="text/javascript" src="../../../js/pacioli-0.5.1.bundle.js"></script>
    <link rel="stylesheet" href="../scene.css">

    <!-- Include each compiled example script here and add the examples to the list below -->
    <script type="text/javascript" src="../surfaces.js"></script>

</head>

<body>
    <div id="console"></div>

    <h1>Wave</h1>
    <p>
        Plot of a surface built from the cosine function.

    <p>
        <math>
            <mi>f</mi>
            <mo>(</mo>
            <mi>u</mi>
            <mo>,</mo>
            <mi>v</mi>
            <mo>)</mo>
            <mo>=</mo>
            <msup>
                <mrow>
                    <mo>(</mo>
                    <mi>x</mi>
                    <mo>,</mo>
                    <mi>y</mi>
                    <mo>,</mo>
                    <mi>z</mi>
                    <mo>)</mo>
                </mrow>
                <mi>T</mi>
            </msup>
        </math>
        with
    <ul>
        <li>
            <math>
                <mi>x</mi>
                <mo>=</mo>
                <mi>u</mi>
            </math>
        </li>
        <li>
            <math>
                <mi>y</mi>
                <mo>=</mo>
                <mi>v</mi>
            </math>
        </li>
        <li>
            <math>
                <mi>z</mi>
                <mo>=</mo>
                <mi>a</mi>
                <mi>cos</mi>
                <mo>(</mo>
                <mi>r</mi>
                <mi>c</mi>
                <mo>)</mo>
            </math>
        </li>
    </ul>
    where
    <math>
        <mi>r</mi>
        <mo>=</mo>
        <msqrt>
            <msup>
                <mi>u</mi>
                <mn>2</mn>
            </msup>
            <mo>+</mo>
            <msup>
                <mi>v</mi>
                <mn>2</mn>
            </msup>
        </msqrt>
    </math>
    ,
    <math>
        <mi>a</mi>
    </math>
    and
    <math>
        <mi>c</mi>
    </math>
    are scaling factors,
    <math>
        <mn>-8</mn>
        <mo>&le;</mo>
        <mi>u</mi>
        <mo>&le;</mo>
        <mn>8</mn>
    </math>
    , and
    <math>
        <mn>-8</mn>
        <mo>&le;</mo>
        <mi>v</mi>
        <mo>&le;</mo>
        <mn>8</mn>
    </math>


    <p>
    <div class="example">
        <pacioli-scene width="900" height="600" id="simple_wave_scene" definition="surfaces:simple_wave_scene"
            kind="scene" perspective axis>
            <parameter label="a" unit="metre">1</parameter>
            <parameter label="c" unit="radian/metre">1</parameter>
            <parameter label="n" unit="1">30</parameter>
            <parameter label="m" unit="1">1</parameter>
            <parameter label="d" unit="1">50</parameter>
            <parameter label="grid" type="boole">true</parameter>
            <parameter label="surface" type="boole">true</parameter>
            <parameter label="wireframe" type="boole">false</parameter>
            <parameter label="partial vectors" type="boole">false</parameter>
            <parameter label="sum vector" type="boole">false</parameter>
            <parameter label="normals" type="boole">false</parameter>
        </pacioli-scene>
        <pacioli-inputs for="simple_wave_scene"></pacioli-inputs>
        <pacioli-controls for="simple_wave_scene"></pacioli-controls>

    </div>



</body>


</html>
