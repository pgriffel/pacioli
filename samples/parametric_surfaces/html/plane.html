<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <title>Plane</title>

    <script
        src="https://cdn.jsdelivr.net/gh/mathjax/MathJax@legacy-v2-develop/unpacked/MathJax.js?config=TeX-AMS_CHTML"></script>

    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            TeX: {
            equationNumbers: { autoNumber: "all" },
            tagSide: "right"
            },
            tex2jax: {
            inlineMath: [ ['$','$'], ["\\(","\\)"] ],
            displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
            processEscapes: true
            }
        });
    </script>

    <script type="text/javascript" src="../../../js/pacioli.bundle.js"></script>
    <link rel="stylesheet" href="../scene.css">

    <!-- Include each compiled example script here and add the examples to the list below -->
    <script type="text/javascript" src="../surfaces.js"></script>

</head>

<body>
    <div id="console"></div>

    <h1>Plane</h1>
    <p>
        Parametrization of a plane.

    <p>
        $f(u, v) = (x, y, z)^T$ with
    <ul>
        <li>$x = u$</li>
        <li>$y = v$</li>
        <li>$z = a + bx + cy$</li>
    </ul>
    where $a$ is an offset, $b$ and $c$ are scaling factors, $-8 \le u \le 8$, and $-8 \le v \le 8$.

    <p>
    <div class="example">
        <pacioli-scene width="900" height="600" id="plane_scene" definition="surfaces:plane_scene" kind="scene"
            perspective axis>
            <parameter label="a" unit="metre">1</parameter>
            <parameter label="b" unit="1">-0.5</parameter>
            <parameter label="c" unit="1">-0.2</parameter>
            <parameter label="n" unit="1">30</parameter>
            <parameter label="m" unit="1">1</parameter>
            <parameter label="d" unit="1">50</parameter>
            <parameter label="grid" type="boole">true</parameter>
            <parameter label="surface" type="boole">true</parameter>
            <parameter label="wireframe" type="boole">false</parameter>
            <parameter label="partial vecors" type="boole">false</parameter>
            <parameter label="sum vector" type="boole">false</parameter>
            <parameter label="normals" type="boole">false</parameter>
        </pacioli-scene>
        <pacioli-inputs for="plane_scene"></pacioli-inputs>
        <pacioli-controls for="plane_scene"></pacioli-controls>
    </div>

</body>


</html>
